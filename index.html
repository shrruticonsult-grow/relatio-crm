<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0d0d0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Relatio CRM"/>
<title>Relatio CRM — Financial</title>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0d0d0d;color:#e8e8e8;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2e2e2e;border-radius:2px}
input,textarea,select,button,label{font-family:inherit}
input::placeholder,textarea::placeholder{color:#444}
select option{background:#111}
.card{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:20px;margin-bottom:16px}
.label{font-size:11px;font-weight:600;color:#555;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:6px}
.input{background:#0d0d0d;border:1px solid #2e2e2e;border-radius:6px;padding:9px 12px;color:#e8e8e8;font-size:13px;width:100%;outline:none}
.btn-primary{padding:8px 16px;border-radius:6px;border:none;background:#e8e8e8;color:#0d0d0d;cursor:pointer;font-size:13px;font-weight:700}
.btn-secondary{padding:8px 16px;border-radius:6px;border:1px solid #2e2e2e;background:transparent;color:#aaa;cursor:pointer;font-size:13px;font-weight:600}
.btn-danger{padding:8px 16px;border-radius:6px;border:1px solid #3a1a1a;background:transparent;color:#e07070;cursor:pointer;font-size:13px;font-weight:600}
.pill{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700}
.prod-tag{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;margin:2px;display:inline-block}
.row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:background .15s}
.row:hover{background:#141414;border-color:#1e1e1e}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0}
.nav-btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.modal-overlay{position:fixed;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;overflow-y:auto}
.modal{background:#111;border:1px solid #2e2e2e;border-radius:14px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.health-track{flex:1;height:4px;background:#2a2a2a;border-radius:2px}
.health-fill{height:100%;border-radius:2px;transition:width .5s}
.tab{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#555;transition:all .15s}
.tab.active{background:#1e1e1e;color:#e8e8e8}
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px}
.checkbox-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;border:1px solid #1e1e1e;cursor:pointer;font-size:12px;color:#aaa}
.checkbox-item:hover{border-color:#2e2e2e;color:#e8e8e8}
.checkbox-item.selected{border-color:#7ec8c8;color:#7ec8c8;background:#7ec8c822}
.alert-card{background:#1a1200;border:1px solid #3a2a00;border-radius:8px;padding:12px;margin-bottom:8px}
.section-title{font-size:16px;font-weight:700;margin-bottom:16px;color:#e8e8e8}
@media(max-width:640px){.desktop-nav{display:none!important}.mobile-nav{display:flex!important}.hide-mobile{display:none!important}.two-col{grid-template-columns:1fr!important}}
@media(min-width:641px){.mobile-nav{display:none!important}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#e07070;color:#fff;font-size:10px;font-weight:700;margin-left:4px}
</style>
</head>
<body>
<div id="app">
  <div id="header" style="background:#111;border-bottom:1px solid #1e1e1e;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100">
    <div style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.08em">RELATIO · FINANCE</div>
    <div class="desktop-nav" id="desktopNav" style="display:flex;gap:4px"></div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-primary hide-mobile" onclick="openAddContact()" style="padding:6px 14px;font-size:13px">+ Add Client</button>
      <button class="btn-secondary" onclick="openSettings()" style="padding:6px 10px;font-size:16px;border-color:#1e1e1e">⚙</button>
    </div>
  </div>
  <div id="main" style="padding:16px;max-width:1400px;margin:0 auto;padding-bottom:80px"></div>
  <div class="mobile-nav" style="position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #1e1e1e;display:flex;justify-content:space-around;padding:6px 0 20px;z-index:100">
    <button onclick="setView('dashboard')" id="mnav-dashboard" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border:none;background:none;cursor:pointer;color:#555;font-size:9px;font-weight:600"><span style="font-size:16px">🏠</span>Home</button>
    <button onclick="setView('pipeline')" id="mnav-pipeline" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border:none;background:none;cursor:pointer;color:#555;font-size:9px;font-weight:600"><span style="font-size:16px">📊</span>Pipeline</button>
    <button onclick="setView('products')" id="mnav-products" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border:none;background:none;cursor:pointer;color:#555;font-size:9px;font-weight:600"><span style="font-size:16px">📦</span>Products</button>
    <button onclick="setView('renewals')" id="mnav-renewals" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border:none;background:none;cursor:pointer;color:#555;font-size:9px;font-weight:600"><span style="font-size:16px">🔔</span>Alerts</button>
    <button onclick="setView('contacts')" id="mnav-contacts" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border:none;background:none;cursor:pointer;color:#555;font-size:9px;font-weight:600"><span style="font-size:16px">👥</span>Clients</button>
    <button onclick="setView('ai')" id="mnav-ai" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border:none;background:none;cursor:pointer;color:#555;font-size:9px;font-weight:600"><span style="font-size:16px">✦</span>AI</button>
    <button onclick="openAddContact()" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border:none;background:none;cursor:pointer;color:#e8e8e8;font-size:9px;font-weight:600"><span style="font-size:16px">＋</span>Add</button>
  </div>
</div>
<div id="modal-container"></div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const STAGES = ["Lead","Proposal","Negotiation","Active","Closed Won","Churned"];
const STAGE_COLORS = {Lead:"#c4a8d4",Proposal:"#7ec8c8",Negotiation:"#f4c97a",Active:"#a8d5a2","Closed Won":"#5ba85b",Churned:"#c4c4c4"};
const COLORS = ["#e8a87c","#7ec8c8","#a8d5a2","#c4a8d4","#f4c97a","#f4a261","#87b4e8","#e887b4"];
const RISK_PROFILES = ["Conservative","Moderate","Aggressive","Very Aggressive"];
const INCOME_BRACKETS = ["< ₹5L","₹5L-10L","₹10L-25L","₹25L-50L","₹50L-1Cr","₹1Cr+"];
const CLIENT_SEGMENTS = ["Retail","Mass Affluent","HNI","Ultra HNI"];

const PRODUCTS = [
  {id:"health_ins",name:"Health Insurance",icon:"🏥",color:"#e87c7c",category:"Insurance"},
  {id:"motor_ins",name:"Motor Insurance",icon:"🚗",color:"#e8a87c",category:"Insurance"},
  {id:"life_ins",name:"Life Insurance",icon:"❤️",color:"#e87ca8",category:"Insurance"},
  {id:"term_ins",name:"Term Insurance",icon:"🛡️",color:"#c4a8d4",category:"Insurance"},
  {id:"home_ins",name:"Home Insurance",icon:"🏠",color:"#a8b4d4",category:"Insurance"},
  {id:"travel_ins",name:"Travel Insurance",icon:"✈️",color:"#87b4e8",category:"Insurance"},
  {id:"mf",name:"Mutual Funds",icon:"📈",color:"#7ec8c8",category:"Investment"},
  {id:"equity",name:"Equity Portfolio",icon:"📊",color:"#a8d5a2",category:"Investment"},
  {id:"pms",name:"PMS",icon:"💼",color:"#5ba85b",category:"Investment"},
  {id:"nps",name:"NPS",icon:"👴",color:"#a8d5a2",category:"Investment"},
  {id:"fd",name:"Fixed Deposit",icon:"🏦",color:"#f4c97a",category:"Investment"},
  {id:"ulip",name:"ULIP",icon:"🔗",color:"#f4a261",category:"Investment"},
  {id:"home_loan",name:"Home Loan",icon:"🏡",color:"#e8a87c",category:"Loan"},
  {id:"personal_loan",name:"Personal Loan",icon:"💰",color:"#f4c97a",category:"Loan"},
  {id:"business_loan",name:"Business Loan",icon:"🏢",color:"#c4a8d4",category:"Loan"},
  {id:"lap",name:"Loan Against Property",icon:"📋",color:"#87b4e8",category:"Loan"},
];

const SEED = [
  {id:1,name:"Rajesh Sharma",company:"Sharma Enterprises",role:"Business Owner",email:"rajesh@sharmaent.com",phone:"+91 98765 43210",whatsapp:"+91 98765 43210",stage:"Active",value:850000,aum:2500000,commission:42500,lastContact:"2026-04-18",nextFollowUp:"2026-04-28",
   products:["health_ins","life_ins","mf","equity"],prospectProducts:["term_ins","pms"],
   birthday:"1975-03-15",anniversary:"2000-11-20",children:2,familyMembers:4,spouseName:"Sunita Sharma",
   riskProfile:"Moderate",incomeBracket:"₹50L-1Cr",segment:"HNI",kycStatus:"Complete",panNumber:"ABCPS1234D",
   renewalDate:"2026-08-15",premiumDue:"2026-05-01",sipDate:5,
   referredBy:"",referrals:[],goals:["Retirement","Child Education"],
   tags:["HNI","Insurance","MF"],color:"#e8a87c",
   notes:[{id:1,date:"2026-04-18",text:"Discussed portfolio rebalancing. Interested in PMS for equity allocation above ₹50L."},{id:2,date:"2026-04-10",text:"Health insurance renewal due in Aug. Family floater ₹20L cover."}],health:92},
  {id:2,name:"Priya Mehta",company:"",role:"Software Engineer",email:"priya.mehta@techco.com",phone:"+91 87654 32109",whatsapp:"+91 87654 32109",stage:"Proposal",value:120000,aum:800000,commission:8500,lastContact:"2026-04-14",nextFollowUp:"2026-04-25",
   products:["mf","health_ins"],prospectProducts:["term_ins","nps"],
   birthday:"1988-07-22",anniversary:"2015-02-14",children:1,familyMembers:3,spouseName:"Amit Mehta",
   riskProfile:"Aggressive",incomeBracket:"₹10L-25L",segment:"Mass Affluent",kycStatus:"Complete",panNumber:"BCDPM5678E",
   renewalDate:"2026-09-10",premiumDue:"2026-06-01",sipDate:10,
   referredBy:"Rajesh Sharma",referrals:[],goals:["Child Education","Home Purchase"],
   tags:["SIP","Young Professional"],color:"#7ec8c8",
   notes:[{id:1,date:"2026-04-14",text:"Wants to start term insurance. Budget ₹15k/yr. Sent proposal."}],health:72},
  {id:3,name:"Suresh Patel",company:"Patel Motors",role:"Proprietor",email:"suresh@patelmotors.com",phone:"+91 76543 21098",whatsapp:"+91 76543 21098",stage:"Active",value:320000,aum:5000000,commission:85000,lastContact:"2026-04-20",nextFollowUp:"2026-04-26",
   products:["motor_ins","health_ins","life_ins","mf","fd","business_loan"],prospectProducts:["equity","pms"],
   birthday:"1968-12-05",anniversary:"1995-05-12",children:3,familyMembers:5,spouseName:"Rekha Patel",
   riskProfile:"Conservative",incomeBracket:"₹1Cr+",segment:"HNI",kycStatus:"Complete",panNumber:"CDESP9012F",
   renewalDate:"2026-07-01",premiumDue:"2026-05-15",sipDate:1,
   referredBy:"",referrals:["Priya Mehta"],goals:["Retirement","Business Expansion"],
   tags:["HNI","Multi-product","VIP"],color:"#a8d5a2",
   notes:[{id:1,date:"2026-04-20",text:"Motor insurance for 3 vehicles due July. Business loan renewal discussion pending."}],health:88},
];

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  contacts: JSON.parse(localStorage.getItem('relatio-fin-contacts') || 'null') || SEED,
  settings: JSON.parse(localStorage.getItem('relatio-fin-settings') || '{}'),
  view: 'dashboard',
  selectedId: null,
  chatHistory: [],
  contactTab: 'overview',
};

function save() {
  localStorage.setItem('relatio-fin-contacts', JSON.stringify(state.contacts));
  localStorage.setItem('relatio-fin-settings', JSON.stringify(state.settings));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const daysAgo = d => Math.floor((new Date() - new Date(d)) / 86400000);
const daysUntil = d => Math.ceil((new Date(d) - new Date()) / 86400000);
const fmt = n => '₹' + Number(n||0).toLocaleString('en-IN');
const fmtDate = s => s ? new Date(s).toLocaleDateString('en-IN',{month:'short',day:'numeric'}) : '—';
const fmtDateFull = s => s ? new Date(s).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
const initials = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const getC = id => state.contacts.find(c=>c.id===id);
const getProduct = id => PRODUCTS.find(p=>p.id===id);

function avatar(c,size=40){
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${c.color}22;border:2px solid ${c.color}55;font-size:${size*.34}px;color:${c.color}">${initials(c.name)}</div>`;
}
function healthBar(v){
  const col=v>=80?'#5ba85b':v>=55?'#f4c97a':'#e07070';
  return `<div style="display:flex;align-items:center;gap:8px"><div class="health-track"><div class="health-fill" style="width:${v}%;background:${col}"></div></div><span style="font-size:11px;color:${col};font-weight:700;min-width:28px">${v}%</span></div>`;
}
function stagePill(stage){
  return `<span class="pill" style="background:${STAGE_COLORS[stage]}22;color:${STAGE_COLORS[stage]}">${stage}</span>`;
}
function productTag(pid){
  const p=getProduct(pid);
  if(!p)return'';
  return `<span class="prod-tag" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44">${p.icon} ${p.name}</span>`;
}
function daysUntilBirthday(dateStr){
  if(!dateStr)return null;
  const today=new Date();
  const bday=new Date(dateStr);
  const next=new Date(today.getFullYear(),bday.getMonth(),bday.getDate());
  if(next<today)next.setFullYear(today.getFullYear()+1);
  return Math.ceil((next-today)/86400000);
}

// ── Alerts ────────────────────────────────────────────────────────────────────
function getAlerts(){
  const alerts=[];
  state.contacts.forEach(c=>{
    // Follow-up overdue
    if(daysUntil(c.nextFollowUp)<=0&&c.stage!=='Churned'&&c.stage!=='Closed Won')
      alerts.push({type:'followup',priority:'high',contact:c,msg:`Follow-up overdue by ${Math.abs(daysUntil(c.nextFollowUp))} days`,icon:'📞'});
    // Renewal in 30 days
    if(c.renewalDate&&daysUntil(c.renewalDate)<=30&&daysUntil(c.renewalDate)>0)
      alerts.push({type:'renewal',priority:'high',contact:c,msg:`Policy renewal in ${daysUntil(c.renewalDate)} days (${fmtDate(c.renewalDate)})`,icon:'🔄'});
    // Premium due in 7 days
    if(c.premiumDue&&daysUntil(c.premiumDue)<=7&&daysUntil(c.premiumDue)>0)
      alerts.push({type:'premium',priority:'high',contact:c,msg:`Premium due in ${daysUntil(c.premiumDue)} days`,icon:'💰'});
    // Birthday in 7 days
    const bdays=daysUntilBirthday(c.birthday);
    if(bdays!==null&&bdays<=7)
      alerts.push({type:'birthday',priority:'medium',contact:c,msg:`Birthday in ${bdays} days (${fmtDate(c.birthday)})`,icon:'🎂'});
    // Anniversary in 7 days
    const adays=daysUntilBirthday(c.anniversary);
    if(adays!==null&&adays<=7)
      alerts.push({type:'anniversary',priority:'medium',contact:c,msg:`Anniversary in ${adays} days`,icon:'💍'});
  });
  return alerts.sort((a,b)=>a.priority==='high'?-1:1);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function setView(v){state.view=v;render();}
function buildNav(){
  const alerts=getAlerts();
  const navs=[['dashboard','🏠 Dashboard'],['pipeline','📊 Pipeline'],['products','📦 Products'],['renewals',`🔔 Alerts${alerts.length?`<span class="badge">${alerts.length}</span>`:''}` ],['contacts','👥 Clients'],['ai','✦ AI Chat']];
  document.getElementById('desktopNav').innerHTML=navs.map(([v,l])=>
    `<button class="nav-btn" onclick="setView('${v}')" style="background:${state.view===v?'#1e1e1e':'transparent'};color:${state.view===v?'#e8e8e8':'#666'}">${l}</button>`
  ).join('');
  navs.forEach(([v])=>{
    const el=document.getElementById('mnav-'+v);
    if(el)el.style.color=state.view===v?'#e8e8e8':'#555';
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  buildNav();
  const main=document.getElementById('main');
  if(state.view==='dashboard')main.innerHTML=renderDashboard();
  else if(state.view==='pipeline')main.innerHTML=renderPipeline();
  else if(state.view==='products')main.innerHTML=renderProducts();
  else if(state.view==='renewals')main.innerHTML=renderAlerts();
  else if(state.view==='contacts')main.innerHTML=renderContact();
  else if(state.view==='ai'){main.innerHTML=renderAI();scrollChatBottom();}
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  const cs=state.contacts;
  const active=cs.filter(c=>c.stage!=='Churned'&&c.stage!=='Closed Won');
  const totalAUM=cs.reduce((s,c)=>s+(c.aum||0),0);
  const totalComm=cs.reduce((s,c)=>s+(c.commission||0),0);
  const totalPipeline=active.reduce((s,c)=>s+(c.value||0),0);
  const alerts=getAlerts();
  const overdue=cs.filter(c=>daysUntil(c.nextFollowUp)<=0&&c.stage!=='Churned'&&c.stage!=='Closed Won');
  const upcomingBdays=cs.filter(c=>{const d=daysUntilBirthday(c.birthday);return d!==null&&d<=7;});

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <div><div style="font-size:22px;font-weight:700">Good morning 👋</div><div style="font-size:13px;color:#555;margin-top:2px">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-secondary" onclick="openChangeRequest()" style="font-size:12px">✦ Request Change</button>
      <button class="btn-secondary" onclick="openImportCSV()" style="font-size:12px">📱 Import Contacts</button>
      <button class="btn-primary hide-mobile" onclick="openAddContact()">+ Add Client</button>
    </div>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px">
    ${[
      ['Total AUM',fmt(totalAUM),'assets managed','#7ec8c8'],
      ['Commission',fmt(totalComm),'earned','#5ba85b'],
      ['Pipeline',fmt(totalPipeline),`${active.length} active`,'#e8e8e8'],
      ['Alerts',alerts.length,'need attention',alerts.length>0?'#e07070':'#e8e8e8'],
      ['Total Clients',cs.length,'in CRM','#e8e8e8'],
    ].map(([l,v,s,col])=>`<div class="card" style="margin-bottom:0"><span class="label">${l}</span><div style="font-size:22px;font-weight:700;color:${col};line-height:1.1">${v}</div><div style="font-size:11px;color:#555;margin-top:4px">${s}</div></div>`).join('')}
  </div>

  <!-- Alerts -->
  ${alerts.length>0?`<div class="card" style="border-color:#3a2a00;background:#120e00;margin-bottom:20px">
    <span class="label" style="color:#f4c97a;margin-bottom:12px">🔔 Action Required (${alerts.length})</span>
    ${alerts.slice(0,5).map(a=>`<div class="row" onclick="openContact(${a.contact.id})" style="border-color:#2a1e00">
      <span style="font-size:20px">${a.icon}</span>
      ${avatar(a.contact,32)}
      <div style="flex:1"><div style="font-weight:600;font-size:13px">${a.contact.name}</div><div style="font-size:12px;color:${a.priority==='high'?'#e07070':'#f4c97a'}">${a.msg}</div></div>
      ${stagePill(a.contact.stage)}
    </div>`).join('')}
    ${alerts.length>5?`<div style="text-align:center;margin-top:8px"><button class="btn-secondary" onclick="setView('renewals')" style="font-size:12px">View all ${alerts.length} alerts →</button></div>`:''}
  </div>`:''}

  <!-- Upcoming birthdays -->
  ${upcomingBdays.length>0?`<div class="card" style="border-color:#2a1a3a;background:#0e0a12;margin-bottom:20px">
    <span class="label" style="color:#c4a8d4;margin-bottom:12px">🎂 Upcoming Birthdays</span>
    ${upcomingBdays.map(c=>`<div class="row" onclick="openContact(${c.id})">
      ${avatar(c,32)}<div style="flex:1"><div style="font-weight:600;font-size:13px">${c.name}</div><div style="font-size:12px;color:#c4a8d4">${daysUntilBirthday(c.birthday)===0?'Today! 🎉':`In ${daysUntilBirthday(c.birthday)} days`}</div></div>

function filterClients(q){
  const list=document.getElementById('client-list');
  if(!list)return;
  const filtered=state.contacts.filter(c=>
    c.name.toLowerCase().includes(q.toLowerCase())||
    (c.company||'').toLowerCase().includes(q.toLowerCase())||
    (c.phone||'').includes(q)
  );
  list.innerHTML=filtered.map(c=>clientRow(c)).join('');
}

function setContactTab(tab){
  state.contactTab=tab;
  const c=getC(state.selectedId);
  if(!c)return;
  const el=document.getElementById('tab-content');
  if(el)el.innerHTML=renderContactTab(c);
  document.querySelectorAll('.tab').forEach(b=>{
    b.classList.toggle('active',b.textContent.toLowerCase()===tab||b.onclick?.toString().includes(`'${tab}'`));
  });
  // re-render tabs properly
  render();
}

function renderContactTab(c){
  if(state.contactTab==='overview')return renderOverviewTab(c);
  if(state.contactTab==='products')return renderProductsTab(c);
  if(state.contactTab==='family')return renderFamilyTab(c);
  if(state.contactTab==='financials')return renderFinancialsTab(c);
  if(state.contactTab==='notes')return renderNotesTab(c);
  if(state.contactTab==='ai')return renderContactAITab(c);
  return '';
}

function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const lines=ev.target.result.split('\n').filter(l=>l.trim());
    const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/['"]/g,''));
    const nameIdx=headers.findIndex(h=>h.includes('name'));
    const phoneIdx=headers.findIndex(h=>h.includes('phone')||h.includes('mobile')||h.includes('number'));
    const emailIdx=headers.findIndex(h=>h.includes('email'));
    const companyIdx=headers.findIndex(h=>h.includes('company')||h.includes('org'));
    const imported=[];
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',').map(c=>c.trim().replace(/['"]/g,''));
      const name=nameIdx>=0?cols[nameIdx]:'';
      if(!name)continue;
      imported.push({
        id:Date.now()+i,name,phone:phoneIdx>=0?cols[phoneIdx]:'',
        email:emailIdx>=0?cols[emailIdx]:'',company:companyIdx>=0?cols[companyIdx]:'',
        whatsapp:phoneIdx>=0?cols[phoneIdx]:'',role:'',value:0,aum:0,stage:'Lead',
        segment:'Retail',riskProfile:'Moderate',incomeBracket:'₹5L-10L',
        tags:['Imported'],color:COLORS[Math.floor(Math.random()*COLORS.length)],
        lastContact:new Date().toISOString().split('T')[0],
        nextFollowUp:new Date(Date.now()+7*86400000).toISOString().split('T')[0],
        notes:[],health:50,products:[],prospectProducts:[],goals:[],referrals:[],commission:0,kycStatus:'Pending',
      });
    }
    const preview=document.getElementById('import-preview');
    if(!preview)return;
    if(imported.length===0){preview.innerHTML='<div style="color:#e07070;font-size:13px">No valid contacts found. Check CSV format.</div>';return;}
    preview.innerHTML=`<div style="background:#0d1a0d;border:1px solid #1a3a1a;border-radius:8px;padding:12px;margin-bottom:12px"><div style="color:#5ba85b;font-weight:600;margin-bottom:8px">✓ Found ${imported.length} contacts</div>${imported.slice(0,3).map(c=>`<div style="font-size:12px;color:#aaa;margin-bottom:4px">• ${c.name}${c.phone?' — '+c.phone:''}</div>`).join('')}${imported.length>3?`<div style="font-size:12px;color:#555">...and ${imported.length-3} more</div>`:''}</div><button class="btn-primary" onclick="confirmImport(${JSON.stringify(imported).replace(/"/g,'&quot;')})">Import ${imported.length} Contacts</button>`;
  };
  reader.readAsText(file);
}

function confirmImport(data){
  // data passed as JSON string via onclick
  const imported=typeof data==='string'?JSON.parse(data.replace(/&quot;/g,'"')):data;
  state.contacts=[...state.contacts,...imported];
  save();closeModal();render();
  alert(`✅ Imported ${imported.length} contacts successfully!`);
}

// ── AI ────────────────────────────────────────────────────────────────────────
async function callClaude(messages,system){
  const key=state.settings.apiKey;
  if(!key){openSettings();return null;}
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system,messages})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content.map(b=>b.text||'').join('');
}

async function runAI(id){
  const c=getC(id);if(!c)return;
  const out=document.getElementById('ai-output');
  const btn=document.getElementById('ai-run-btn');
  if(!out||!btn)return;
  out.innerHTML='<span class="spinner"></span> Claude is thinking…';
  btn.disabled=true;
  const company=state.settings.companyName||'our financial consultancy';
  const owner=state.settings.ownerName||'our team';
  const sys=`You are an expert financial advisor assistant for ${company}. You help with client relationship management, insurance, investments, and loans. Be specific, actionable, and concise. Use Indian financial context (₹, Indian regulations, LIC, HDFC, SBI etc).`;
  const clientInfo=`Client: ${c.name} | Company: ${c.company||'—'} | Segment: ${c.segment} | Risk: ${c.riskProfile} | Income: ${c.incomeBracket}
AUM: ₹${(c.aum||0).toLocaleString('en-IN')} | Products: ${(c.products||[]).map(pid=>getProduct(pid)?.name).join(', ')||'None'} | Prospect: ${(c.prospectProducts||[]).map(pid=>getProduct(pid)?.name).join(', ')||'None'}
Stage: ${c.stage} | Last contact: ${daysAgo(c.lastContact)} days ago | Health: ${c.health}%
Notes: ${(c.notes||[]).slice(0,2).map(n=>n.text).join(' | ')||'None'}`;
  const prompts={
    insights:`${clientInfo}\n\nGive 4 sharp insights and next best actions for this financial services client. Include specific product recommendations based on their profile.`,
    email:`${clientInfo}\n\nDraft a professional follow-up email from ${owner} at ${company}. Goal: strengthen relationship and identify upsell opportunity. Under 150 words. Subject line included.`,
    engage:`${clientInfo}\n\nSuggest 3 creative, genuine ways to engage this client. Consider their life stage (family: ${c.familyMembers||'?'} members, children: ${c.children||0}, anniversary: ${c.anniversary?'yes':'no'}). Ideas should feel personal, not promotional.`,
    products:`${clientInfo}\n\nAnalyze this client's financial profile and suggest the top 3 products they don't have yet that would genuinely benefit them. For each: explain why it suits them, estimated premium/investment, and how to pitch it.`,
    whatsapp:`${clientInfo}\n\nDraft a brief, warm WhatsApp message for this client. Keep it under 50 words. Friendly tone. Context: ${daysAgo(c.lastContact)} days since last contact. Sign off as ${owner}.`,
  };
  try{
    const result=await callClaude([{role:'user',content:prompts[currentAiMode]}],sys);
    out.innerHTML=result?`<div style="font-size:13px;color:#ccc;line-height:1.75;white-space:pre-wrap">${result}</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="navigator.clipboard.writeText(document.querySelector('#ai-output div').textContent)" class="btn-secondary" style="font-size:11px;padding:5px 12px">📋 Copy</button>
        ${currentAiMode==='whatsapp'&&(c.whatsapp||c.phone)?`<button onclick="openWhatsApp('${c.whatsapp||c.phone}',document.querySelector('#ai-output div').textContent)" style="background:#25D366;border:none;color:#fff;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer">💬 Send on WhatsApp</button>`:''}
        ${currentAiMode==='email'&&c.email?`<a href="mailto:${c.email}" style="background:#1e1e1e;border:1px solid #2e2e2e;color:#aaa;border-radius:6px;padding:5px 12px;font-size:11px;text-decoration:none">✉️ Open Email</a>`:''}
      </div>`:'No response.';
  }catch(e){out.innerHTML=`<span style="color:#e07070">Error: ${e.message}</span>`;}
  btn.disabled=false;
}

// ── AI Chat ───────────────────────────────────────────────────────────────────
function renderAI(){
  const msgs=state.chatHistory;
  return `
  <div style="font-size:22px;font-weight:700;margin-bottom:16px">✦ AI Assistant</div>
  ${!state.settings.apiKey?`<div class="alert-card" style="margin-bottom:12px"><div style="font-size:13px;color:#f4c97a">Add API key in <button onclick="openSettings()" style="background:none;border:none;color:#f4c97a;text-decoration:underline;cursor:pointer;font-size:13px;padding:0">Settings</button> to use AI chat.</div></div>`:''}
  <div class="card" style="display:flex;flex-direction:column;height:calc(100dvh - 220px)">
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding-bottom:8px">
      ${msgs.length===0?`<div style="color:#444;font-size:13px;padding:12px 0">Ask me anything about your clients, pipeline, or financial advisory strategy.
        <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
          ${["Who needs a policy renewal follow-up?","Which clients are good candidates for mutual funds?","Draft a marketing message for health insurance season","Which HNI clients haven't been contacted in 30+ days?","Suggest cross-sell opportunities for my top clients"].map(q=>`<button onclick="setChatInput(\`${q}\`)" style="background:transparent;border:1px solid #1e1e1e;border-radius:8px;padding:10px 14px;color:#555;cursor:pointer;font-size:12px;text-align:left;font-family:inherit">${q}</button>`).join('')}
        </div>
      </div>`:''}
      ${msgs.map(m=>`<div style="margin-bottom:14px;display:flex;flex-direction:${m.role==='user'?'row-reverse':'row'};gap:8px"><div style="max-width:80%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65;background:${m.role==='user'?'#1e1e1e':'#141414'};border:1px solid ${m.role==='user'?'#2e2e2e':'#1a1a1a'};color:#d8d8d8;white-space:pre-wrap">${m.content}</div></div>`).join('')}
      <div id="chat-end"></div>
    </div>
    <div style="display:flex;gap:8px;padding-top:12px;border-top:1px solid #1e1e1e">
      <input id="chatInput" class="input" placeholder="Ask about clients, products, pipeline…" onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendChat()"/>
      <button class="btn-primary" onclick="sendChat()">Send</button>
    </div>
  </div>`;
}

function scrollChatBottom(){setTimeout(()=>{const el=document.getElementById('chat-end');if(el)el.scrollIntoView();},100);}
function setChatInput(q){const el=document.getElementById('chatInput');if(el)el.value=q;}

async function sendChat(){
  const input=document.getElementById('chatInput');
  if(!input||!input.value.trim())return;
  const msg={role:'user',content:input.value.trim()};
  state.chatHistory.push(msg);input.value='';render();
  const sys=`You are an expert financial advisor CRM assistant for ${state.settings.companyName||'a financial consultancy'}. 
Client data: ${state.contacts.map(c=>`${c.name} (${c.segment}, ${c.stage}, AUM:₹${(c.aum||0).toLocaleString('en-IN')}, products:${(c.products||[]).map(p=>getProduct(p)?.name).join('/')||'none'}, last contact:${daysAgo(c.lastContact)}d ago, renewal:${c.renewalDate||'none'})`).join('\n')}
Total AUM: ₹${state.contacts.reduce((s,c)=>s+(c.aum||0),0).toLocaleString('en-IN')}. Be specific and practical. Use Indian financial context.`;
  try{
    const result=await callClaude(state.chatHistory,sys);
    state.chatHistory.push({role:'assistant',content:result||'No response'});
  }catch(e){state.chatHistory.push({role:'assistant',content:'Error: '+e.message});}
  render();
}

// ── Change Request ────────────────────────────────────────────────────────────
function openChangeRequest(){
  document.getElementById('modal-container').innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:520px">
      <div style="font-size:18px;font-weight:700;margin-bottom:6px">✦ Request a Change</div>
      <div style="font-size:13px;color:#555;margin-bottom:16px">Describe any feature or improvement you want added to this CRM.</div>
      <textarea id="cr-input" class="input" style="height:100px;resize:vertical;line-height:1.6" placeholder="e.g. Add a commission tracker by product, add SIP reminder emails, show a monthly revenue chart…"></textarea>
      <button class="btn-primary" onclick="submitChangeRequest()" style="width:100%;margin-top:12px;margin-bottom:16px" id="cr-btn">Get Implementation Guide</button>
      <div id="cr-output"></div>
      <div style="background:#0d0d12;border:1px solid #1e1e2e;border-radius:8px;padding:14px;margin-bottom:16px">
        <div style="font-size:11px;font-weight:600;color:#7ec8c8;margin-bottom:8px">HOW TO APPLY CHANGES</div>
        <div style="font-size:12px;color:#666;line-height:1.7">1. Copy the instructions<br>2. Go to GitHub → index.html → ✏ Edit<br>3. Apply changes → Commit<br>4. Vercel auto-redeploys in 30 seconds!</div>
      </div>
      <div style="display:flex;justify-content:flex-end"><button class="btn-secondary" onclick="closeModal()">Close</button></div>
    </div>
  </div>`;
}

async function submitChangeRequest(){
  const req=document.getElementById('cr-input')?.value;
  if(!req?.trim())return;
  const out=document.getElementById('cr-output');
  const btn=document.getElementById('cr-btn');
  out.innerHTML='<span class="spinner"></span> Claude is thinking…';
  btn.disabled=true;
  const sys=`You are a developer for Relatio CRM — a single-file HTML/vanilla JS CRM for Indian financial consultants. Give exact code changes for index.html.`;
  try{
    const result=await callClaude([{role:'user',content:`Feature request:\n\n${req}\n\nExplain exactly what to change in index.html.`}],sys);
    out.innerHTML=`<div style="background:#0d0d0d;border:1px solid #1e1e1e;border-radius:8px;padding:16px;margin-bottom:16px"><span class="label">Implementation Guide</span><div style="font-size:13px;color:#ccc;line-height:1.75;white-space:pre-wrap">${result}</div><button onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)" class="btn-secondary" style="margin-top:12px;font-size:11px;padding:5px 12px">📋 Copy</button></div>`;
  }catch(e){out.innerHTML=`<span style="color:#e07070">Error: ${e.message}</span>`;}
  btn.disabled=false;
}

// ── Settings ──────────────────────────────────────────────────────────────────
function openSettings(){
  document.getElementById('modal-container').innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div style="font-size:18px;font-weight:700;margin-bottom:20px">⚙ Settings</div>
      <div style="margin-bottom:14px"><label class="label">Anthropic API Key</label><input id="s-key" type="password" class="input" placeholder="sk-ant-…" value="${state.settings.apiKey||''}"/><div style="font-size:11px;color:#444;margin-top:4px">Get it at console.anthropic.com — stored in your browser only</div></div>
      <div style="margin-bottom:14px"><label class="label">Your Name</label><input id="s-name" class="input" placeholder="e.g. Shruti" value="${state.settings.ownerName||''}"/></div>
      <div style="margin-bottom:24px"><label class="label">Company Name</label><input id="s-company" class="input" placeholder="e.g. Shruti Consultancy" value="${state.settings.companyName||''}"/></div>
      <div style="border-top:1px solid #1e1e1e;padding-top:16px;margin-bottom:20px">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">Data Backup</div>
        <div style="font-size:12px;color:#555;margin-bottom:10px">All data saved in your browser. Export regularly to backup.</div>
        <div style="display:flex;gap:8px">
          <button class="btn-secondary" onclick="exportData()" style="font-size:12px">⬇ Export JSON</button>
          <label class="btn-secondary" style="font-size:12px;cursor:pointer">⬆ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
      </div>
    </div>
  </div>`;
}

function saveSettings(){
  state.settings={apiKey:document.getElementById('s-key')?.value||'',ownerName:document.getElementById('s-name')?.value||'',companyName:document.getElementById('s-company')?.value||''};
  save();closeModal();alert('Settings saved! ✅');
}
function exportData(){
  const blob=new Blob([JSON.stringify({contacts:state.contacts,settings:state.settings,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`relatio-backup-${new Date().toISOString().split('T')[0]}.json`;a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.contacts)state.contacts=d.contacts;if(d.settings)state.settings=d.settings;save();closeModal();render();alert('Imported!');}catch{alert('Invalid file');}};
  reader.readAsText(file);
}
function closeModal(){document.getElementById('modal-container').innerHTML='';}

// ── Init ──────────────────────────────────────────────────────────────────────
if(!state.settings.apiKey)openSettings();
render();
</script>
</body>
</html>
